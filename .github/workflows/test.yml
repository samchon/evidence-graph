name: test

on:
  pull_request:
  workflow_dispatch:

jobs:
  Test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test
