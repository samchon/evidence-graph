name: CI

# Evidence ships Go source that ttsc links into its own binary, plus a
# TypeScript descriptor, so the checks come in three shapes: formatting,
# the native Go unit tests, and an end-to-end run against the real ttsc.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prettier --check
        run: pnpm exec prettier --check "**/*.ts" "**/*.md"

  unit:
    name: unit (go test)
    runs-on: ubuntu-latest
    steps:
      # The native package's go.mod resolves @ttsc/lint and the typescript-go
      # shims through replace directives pointing at a sibling samchon/ttsc
      # checkout, so the two repositories must sit side by side as
      # <workspace>/samchon/evidence and <workspace>/samchon/ttsc. The ttsc ref
      # is pinned to the released version the published peer range targets.
      - uses: actions/checkout@v4
        with:
          path: samchon/evidence
      - uses: actions/checkout@v4
        with:
          repository: samchon/ttsc
          ref: v0.19.3
          path: samchon/ttsc
      - uses: actions/setup-go@v5
        with:
          go-version-file: samchon/evidence/packages/evidence/go.mod
          cache-dependency-path: samchon/evidence/packages/evidence/go.sum
      - name: gofmt
        working-directory: samchon/evidence
        run: |
          unformatted=$(gofmt -l packages/evidence/native)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go test
        working-directory: samchon/evidence/packages/evidence
        run: go test -mod=readonly ./native/

  features:
    name: features (real ttsc e2e)
    runs-on: ubuntu-latest
    steps:
      # ttsc compiles the native package into its own binary here, so a Go
      # toolchain is required even though the tests are driven from Node. ttsc
      # itself comes from npm (the published peer version), not a source
      # checkout — it supplies the native package's dependencies from its own
      # module graph, exactly as a consumer's install would.
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/evidence/go.mod
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:features
